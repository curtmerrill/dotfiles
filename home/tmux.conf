# Change prefix from Ctrl-B to Ctrl-A
# (Easier to type with CapsLock mapped to Ctrl)
unbind C-b
set -g prefix C-a

# Split panes using | and -
# -c ... sets new split to current working dir
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Use vim-like directions to navigate panes
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Add Meta-arrows to select panes (meta = "alt" on mac)
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# Number windows and panes starting at 1
set -g base-index 1
set-window-option -g pane-base-index 1

set -g default-terminal "screen-256color"

set -g status-position top
set -g status-left-length 25
set -g status-left "#S"

# do NOT rename windows automatically
set-option -g allow-rename off


# Enable mouse control (clickable windows, panes, resize panes)
set -g mouse on
